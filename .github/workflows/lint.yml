name: Lint

on:
  push:
    branches: [ master ]
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/lint.yml'

# Read-only: workflow only checks out source and runs golangci-lint + gofmt.
permissions:
  contents: read

jobs:
  golangci:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.24'
          cache: false

      - name: golangci-lint
        env:
          GOTOOLCHAIN: go1.24.2
        run: go run github.com/golangci/golangci-lint/cmd/golangci-lint@v1.64.8 run --timeout=3m --out-format=line-number --fast --max-issues-per-linter=0 --max-same-issues=0

      - name: Check formatting
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "The following files are not formatted correctly:"
            gofmt -l .
            echo "Fix these issues"
            gofmt -d .
            exit 1
          fi

      - name: Check for dead code
        run: |
          # Pin to a release compatible with the project's Go 1.24 toolchain.
          # Newer x/tools (v0.45.0+) requires Go 1.25+.
          go install golang.org/x/tools/cmd/deadcode@v0.36.0
          out=$("$(go env GOPATH)/bin/deadcode" -test ./...)
          if [ -n "$out" ]; then
            echo "::error::Dead code detected. Remove the following or refactor so it's reachable:"
            echo "$out"
            exit 1
          fi

      - name: Check file lengths
        run: scripts/lint-file-length.sh
