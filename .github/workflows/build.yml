name: Build

on:
  push:
    branches: [ master ]
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/build.yml'

# Read-only: workflow only checks out source, runs tests, and uploads artifacts (artifact upload uses the Actions API, not repo contents).
permissions:
  contents: read

jobs:
  build:
    name: Build Binary and Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin]
        goarch: [amd64, arm64]

    steps:
    - uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.25'
        cache: true

    # internal/shellsuggest claims correctness in sh, bash AND zsh, and its tests
    # FAIL rather than skip when a claimed shell is missing (#1978/#1988). Every
    # lane that runs `go test` therefore needs zsh, not just pr.yml — this job
    # runs the suite on the release matrix, and auto-release/stable-release run it
    # too. The runner is ubuntu regardless of the GOOS/GOARCH it builds for.
    - name: Install zsh
      run: sudo apt-get update && sudo apt-get install -y --no-install-recommends zsh

    - name: Run tests
      run: go test -v ./...

    - name: Build
      env:
        GOOS: ${{ matrix.goos }}
        GOARCH: ${{ matrix.goarch }}
      run: |
        go build -v -o build/${{ matrix.goos }}_${{ matrix.goarch }}/agent-factory

    - name: Upload artifacts
      uses: actions/upload-artifact@v7
      with:
        name: agent-factory-${{ matrix.goos }}-${{ matrix.goarch }}
        path: build/${{ matrix.goos }}_${{ matrix.goarch }}/*
        retention-days: 7
