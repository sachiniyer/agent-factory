name: Docs

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:
    inputs:
      deploy_docs:
        description: 'Deploy docs from master without a push event'
        required: false
        default: false
        type: boolean

# GITHUB_TOKEN defaults to read-only; the deploy job needs to publish the Pages
# artifact and mint the OIDC token actions/deploy-pages exchanges.
permissions:
  contents: read

jobs:
  # Runs on every push and PR: prove the autogenerated reference pages are in
  # sync with the code, then build the site with --strict so any broken link or
  # bad reference fails the check.
  build:
    name: Build & verify
    runs-on: ubuntu-latest
    outputs:
      docs_changed: ${{ steps.docs_changes.outputs.docs_changed }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check docs deploy paths
        id: docs_changes
        if: (github.event_name == 'push' && github.ref == 'refs/heads/master') || github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "docs_changed=${{ inputs.deploy_docs }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          before="${{ github.event.before }}"
          after="${{ github.sha }}"

          if [[ -z "$before" || "$before" =~ ^0+$ ]]; then
            changed="$(git diff-tree --no-commit-id --name-only -r "$after")"
          else
            changed="$(git diff --name-only "$before" "$after")"
          fi

          docs_changed=false
          while IFS= read -r path; do
            case "$path" in
              docs/*|mkdocs.yml|README.md|commands/docs_gen.go|requirements-docs.txt|scripts/gen-docs.sh)
                docs_changed=true
                break
                ;;
            esac
          done <<< "$changed"

          echo "docs_changed=$docs_changed" >> "$GITHUB_OUTPUT"

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.24"

      - name: Regenerate autogen docs and check for drift
        run: |
          scripts/gen-docs.sh
          if ! git diff --quiet -- docs/reference; then
            echo "::error::docs/reference is stale. Run scripts/gen-docs.sh and commit the result."
            git --no-pager diff -- docs/reference
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install MkDocs toolchain
        run: pip install -r requirements-docs.txt

      - name: Build (strict)
        run: mkdocs build --strict

      - name: Upload Pages artifact
        if: steps.docs_changes.outputs.docs_changed == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  # Publishes the artifact to GitHub Pages. Only on master, only when docs paths
  # changed, only after build+verify passes. Pages source must be set to
  # "GitHub Actions" (Settings → Pages → Build and deployment → Source).
  deploy:
    name: Deploy
    if: github.ref == 'refs/heads/master' && needs.build.outputs.docs_changed == 'true'
    needs: build
    runs-on: ubuntu-latest
    concurrency:
      group: pages
      cancel-in-progress: false
    permissions:
      pages: write
      id-token: write
      contents: read
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url || steps.deployment_retry.outputs.page_url || steps.deployment_final.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        timeout-minutes: 5
        continue-on-error: true
        uses: actions/deploy-pages@v4

      - name: Back off before retrying Pages deploy
        if: steps.deployment.outcome == 'failure'
        run: sleep 15

      - name: Retry GitHub Pages deploy
        id: deployment_retry
        if: steps.deployment.outcome == 'failure'
        timeout-minutes: 5
        continue-on-error: true
        uses: actions/deploy-pages@v4

      - name: Back off before final Pages deploy retry
        if: steps.deployment.outcome == 'failure' && steps.deployment_retry.outcome == 'failure'
        run: sleep 30

      - name: Final GitHub Pages deploy retry
        id: deployment_final
        if: steps.deployment.outcome == 'failure' && steps.deployment_retry.outcome == 'failure'
        timeout-minutes: 5
        uses: actions/deploy-pages@v4
