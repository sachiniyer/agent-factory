name: PR Validation

on:
  pull_request:
    branches: [master]
  # A merge queue creates a temporary gh-readonly-queue/… ref and dispatches the
  # merge_group event. The required "Lint" and "Build" checks below MUST run on
  # that event and report against the merge_group ref, or the queue never gets a
  # result and every merge stalls forever. The jobs are the SAME ones the PR runs
  # (none is gated on github.event_name), so they report the identical "Lint" and
  # "Build" check contexts on the merged-result ref. Do NOT filter merge_group by
  # branch — the queue only ever targets master, and a base-branch filter here is
  # an easy way to silently stop the checks from running.
  merge_group:

concurrency:
  # pull_request keys the group on the PR number so a new push cancels the stale
  # run (pr-123). merge_group carries no pull_request payload, so that expression
  # is empty: without a fallback EVERY merge_group run would share the group "pr-"
  # and cancel-in-progress would cancel the previous queue entry, stalling the
  # merge queue. Fall back to github.ref, which is the unique gh-readonly-queue/…
  # ref per merge_group entry (and refs/pull/N/merge for PRs, so PR runs never
  # collide with queue runs either). Mirrors how auto-gate.yml keys off a fallback
  # chain when the pull_request payload is null.
  group: pr-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

# Read-only: workflow only checks out source and runs lint/test/build; it never comments on or modifies the PR.
permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - name: golangci-lint
        env:
          GOTOOLCHAIN: go1.25.0
        run: go run github.com/golangci/golangci-lint/cmd/golangci-lint@v1.64.8 run --timeout=3m --out-format=line-number --fast --max-issues-per-linter=0 --max-same-issues=0

      - name: Check formatting
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "::error::Unformatted files found:"
            echo "$unformatted"
            gofmt -d .
            exit 1
          fi

      - name: Check for dead code
        run: |
          # Pinned for reproducibility; v0.48.0 supports the Go 1.25 language version
          # (older x/tools cannot analyze go1.25 source).
          go install golang.org/x/tools/cmd/deadcode@v0.48.0
          out=$("$(go env GOPATH)/bin/deadcode" -test ./...)
          if [ -n "$out" ]; then
            echo "::error::Dead code detected. Remove the following or refactor so it's reachable:"
            echo "$out"
            exit 1
          fi

      - name: Check file lengths
        run: scripts/lint-file-length.sh

      # The auto-gate helper decides what auto-merges, but nothing ran its tests
      # in CI — they only ever ran by hand (#1907). Lives in the Lint job because
      # Lint is a required check, so this gates from the moment it lands; a
      # dedicated job would need a ruleset edit before it gated anything. Uses the
      # runner's preinstalled Node and the built-in node:test — no package.json,
      # no install step.
      - name: Test auto-gate helper
        run: node --test .github/scripts/auto-gate.test.js

      # Same rationale as the auto-gate test above: the stale-external-pr helper
      # decides which fork PRs to auto-close, so its pure decision logic gates
      # here in the required Lint job. Built-in node:test, no install step.
      - name: Test stale-external-pr helper
        run: node --test .github/scripts/stale-external-pr.test.js

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: true

      # internal/shellsuggest builds the shell commands we PRINT for a user to
      # paste, and claims correctness in sh, bash AND zsh — so its tests execute
      # under each. zsh is the one that matters most: it has been macOS's default
      # login shell since Catalina, so it is what most readers actually paste
      # into, and it is the ONLY one of the three where a leading '=' expands
      # (#1978). The ubuntu runner ships sh and bash but not zsh; without this the
      # suite would cover two of the three shells it claims, and a zsh-only defect
      # would reach users with CI green — the same gap test-macos exists to close,
      # one layer down. The macOS runner already ships zsh, so this is Linux-only.
      - name: Install zsh
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends zsh

      - name: Run tests
        run: go test -v -race -count=1 ./...

  # We cross-compile and ship darwin/arm64 and darwin/amd64 binaries from
  # stable-release.yml, but every job in this repo ran on ubuntu — so no test had
  # ever executed on the OS we ship to. macOS-only defects reached users instead
  # of CI (#1918, #1916). This job closes that gap.
  #
  # Core Go suite only: the *-container targets need Docker, which GitHub's macOS
  # runners do not have. Those stay on Linux.
  #
  # ./daemon is deliberately NOT excluded. It spawns real af daemons, which is
  # forbidden on the shared dev box but is exactly what we want exercised here on
  # a throwaway runner — the launchd paths live in that package and are the point.
  test-macos:
    name: Test (macOS)
    runs-on: macos-latest
    # macOS runner minutes bill at 10x Linux; a hung PTY/daemon test must not burn
    # a six-hour default. The Linux suite finishes well inside this.
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: true

      # tmux is preinstalled on the ubuntu runners but NOT on the macOS ones, and
      # a dozen packages (session, daemon, config, app, ui, …) shell out to it.
      # Without this the suite fails at "executable file not found in $PATH"
      # rather than on anything real.
      - name: Install tmux
        run: brew install tmux

      # The suite shells out to tmux, dd and sh, and darwin's are not the Linux
      # ones — brew's tmux is typically newer than the ubuntu runner's, and the
      # userland is BSD. When a macOS-only failure turns out to be environmental,
      # this is the first thing anyone asks for; record it rather than re-running
      # the job to find out (#1945).
      - name: Record the runner's toolchain
        run: |
          tmux -V
          sw_vers
          echo "shell: ${SHELL:-<unset>} | term: ${TERM:-<unset>} | tmpdir: ${TMPDIR:-<unset>}"
          command -v dd sh git
          dd --version 2>&1 | head -1 || echo "dd: BSD (no --version)"

      - name: Run tests
        run: go test -v -race -count=1 ./...

  build:
    name: Build
    runs-on: ubuntu-latest
    # "Build" and "Lint" are this repo's only required checks (ruleset 14851503),
    # so Build is where Test and Test (macOS) get their teeth — a new standalone
    # job would gate nothing until someone edited the ruleset (see the same note on
    # the auto-gate helper test above).
    #
    # `needs` ALONE is not enough, and this is the trap: a failed dependency leaves
    # Build SKIPPED, and a skipped required check does not fail — GitHub's docs are
    # explicit that dependent jobs "are skipped and do not report a failure", so the
    # required check never goes red and the merge button stays live. (auto-gate.js
    # blocks anyway, since it demands conclusion === "success", but the native path
    # would not.) So: run ALWAYS, and fail loudly on any unsuccessful need. Now a
    # red macOS job turns the REQUIRED check red instead of quietly skipping it.
    needs: [lint, test, test-macos]
    if: always()
    steps:
      - name: Gate on the jobs this check stands in for
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: |
          echo "::error::A required job failed — failing Build so the required check goes RED rather than skipping."
          # needs['test-macos'], not needs.test-macos: a hyphen in a property path is
          # parsed as subtraction, so the dotted form silently yields an empty string.
          echo "lint=${{ needs.lint.result }} test=${{ needs.test.result }} test-macos=${{ needs['test-macos'].result }}"
          exit 1

      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: true

      - name: Verify compilation
        run: go build ./...
