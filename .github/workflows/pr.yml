name: PR Validation

on:
  pull_request:
    branches: [master]

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

# Read-only: workflow only checks out source and runs lint/test/build; it never comments on or modifies the PR.
permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - name: golangci-lint
        env:
          GOTOOLCHAIN: go1.25.0
        run: go run github.com/golangci/golangci-lint/cmd/golangci-lint@v1.64.8 run --timeout=3m --out-format=line-number --fast --max-issues-per-linter=0 --max-same-issues=0

      - name: Check formatting
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "::error::Unformatted files found:"
            echo "$unformatted"
            gofmt -d .
            exit 1
          fi

      - name: Check for dead code
        run: |
          # Pinned for reproducibility; v0.48.0 supports the Go 1.25 language version
          # (older x/tools cannot analyze go1.25 source).
          go install golang.org/x/tools/cmd/deadcode@v0.48.0
          out=$("$(go env GOPATH)/bin/deadcode" -test ./...)
          if [ -n "$out" ]; then
            echo "::error::Dead code detected. Remove the following or refactor so it's reachable:"
            echo "$out"
            exit 1
          fi

      - name: Check file lengths
        run: scripts/lint-file-length.sh

      # The auto-gate helper decides what auto-merges, but nothing ran its tests
      # in CI — they only ever ran by hand (#1907). Lives in the Lint job because
      # Lint is a required check, so this gates from the moment it lands; a
      # dedicated job would need a ruleset edit before it gated anything. Uses the
      # runner's preinstalled Node and the built-in node:test — no package.json,
      # no install step.
      - name: Test auto-gate helper
        run: node --test .github/scripts/auto-gate.test.js

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: true

      - name: Run tests
        run: go test -v -race -count=1 ./...

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: true

      - name: Verify compilation
        run: go build ./...
