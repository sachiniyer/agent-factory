site_name: Agent Factory
site_description: >-
  Terminal UI for running many AI coding agents — Claude Code, Codex, Aider,
  Gemini, and Amp — each in its own isolated git worktree.
site_url: https://sachiniyer.github.io/agent-factory/
repo_url: https://github.com/sachiniyer/agent-factory
repo_name: sachiniyer/agent-factory
edit_uri: edit/master/docs/
copyright: Agent Factory is licensed under the GNU AGPL v3.

docs_dir: docs

theme:
  name: material
  custom_dir: docs/overrides
  logo: assets/logo.svg
  favicon: assets/favicon.svg
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.footer
    - toc.follow
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - search.suggest
    - search.highlight
  palette:
    # Auto (respects the OS): the icon toggles light <-> dark. The accent
    # teal (ui/theme.go #7cb8bb) and its contrast-safe derivatives are defined
    # in docs/stylesheets/extra.css, so both schemes use `custom`.
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  font:
    text: Inter
    code: Roboto Mono

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true

extra_css:
  - stylesheets/extra.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/sachiniyer/agent-factory
      name: Agent Factory on GitHub

plugins:
  - search

# Fail the build on broken in-repo links (the valuable check), but don't choke
# on links that intentionally point outside docs/ (e.g. ../.github/…) or on
# every cross-page anchor. `mkdocs build --strict` turns the warnings below into
# errors.
validation:
  omitted_files: warn
  not_found: warn
  absolute_links: ignore
  unrecognized_links: ignore
  anchors: ignore

nav:
  - Home: index.md
  - Why Agent Factory: why-agent-factory.md
  - How it works: how-it-works.md
  - Use cases: use-cases.md
  - Compare: comparison.md
  - Docs:
      - Start here:
          - Getting started: getting-started.md
          - CLI guide: cli.md
          - Configuration: configuration.md
      - Core concepts:
          - Sessions & worktrees: concepts/worktree-agents.md
          - The TUI: concepts/tui.md
          - The daemon: concepts/daemon.md
          - Tasks & automation: tasks.md
          - Backends (runtimes): backends.md
          - Remote hooks: remote-hooks.md
          - Remote daemon access: remote-tcp-auth.md
          - Usage limits: usage-limits.md
      - API & reference:
          - HTTP API guide: http-api.md
          - CLI reference: reference/cli.md
          - HTTP API reference: reference/api.md
      - Maintainers:
          - Container testing: container-testing.md
          - Web client selftest: web-selftest.md
          - File-length lint: file-length-lint.md
          - Release process: release-process.md
          - Release notes: release-notes.md
          - Release testing plan: release-testing-plan.md
          - TUI manual testing: tui-manual-testing.md
          - TUI rewrite (design): design/tui-rewrite.md
