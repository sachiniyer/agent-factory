site_name: Agent Factory
site_description: >-
  Terminal UI for running many AI coding agents — Claude Code, Codex, Aider,
  Gemini — each in its own isolated git worktree.
site_url: https://sachiniyer.github.io/agent-factory/
repo_url: https://github.com/sachiniyer/agent-factory
repo_name: sachiniyer/agent-factory
edit_uri: edit/master/docs/
copyright: Agent Factory is licensed under the GNU AGPL v3.

docs_dir: docs

theme:
  name: material
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.sections
    - navigation.top
    - navigation.instant
    - navigation.tracking
    - navigation.footer
    - toc.follow
    - content.code.copy
    - content.code.annotate
    - search.suggest
    - search.highlight
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search

# Fail the build on broken in-repo links (the valuable check), but don't choke
# on links that intentionally point outside docs/ (e.g. ../.github/…) or on
# every cross-page anchor. `mkdocs build --strict` turns the warnings below into
# errors.
validation:
  omitted_files: warn
  not_found: warn
  absolute_links: ignore
  unrecognized_links: ignore
  anchors: ignore

nav:
  - Home: index.md
  - Getting started: getting-started.md
  - Concepts:
      - Worktree-isolated agents: concepts/worktree-agents.md
      - The daemon: concepts/daemon.md
      - The TUI: concepts/tui.md
      - Tasks & automation: tasks.md
      - Remote hooks: remote-hooks.md
      - Usage limits: usage-limits.md
  - Guides:
      - CLI guide: cli.md
      - Configuration: configuration.md
      - HTTP API guide: http-api.md
  - Reference:
      - CLI reference: reference/cli.md
      - HTTP API reference: reference/api.md
  - Contributing & internals:
      - Container testing: container-testing.md
      - File-length lint: file-length-lint.md
      - Release process: release-process.md
      - Release testing plan: release-testing-plan.md
      - TUI manual testing: tui-manual-testing.md
      - TUI rewrite (design): design/tui-rewrite.md
